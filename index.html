<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roll the Dice</title>
 <script src="script.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a12;
    --accent: #f0e040;
    --muted: #555570;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(240,224,64,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(240,224,64,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(240,224,64,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(240,224,64,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(240,224,64,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 45%, rgba(240,224,64,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(240,224,64,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(240,224,64,0.1) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
  }

  .title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(240,224,64,0.4), 0 0 60px rgba(240,224,64,0.15);
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 30px rgba(240,224,64,0.4), 0 0 60px rgba(240,224,64,0.15); }
    50%       { text-shadow: 0 0 50px rgba(240,224,64,0.7), 0 0 100px rgba(240,224,64,0.3); }
  }

  /* Dice row */
  .dice-row {
    display: flex;
    align-items: flex-end;
    gap: 36px;
  }

  .dice-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }

  .die-result {
    font-family: 'Bebas Neue', cursive;
    font-size: 3rem; line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 16px rgba(240,224,64,0.5);
    opacity: 0;
    transform: scale(0.5) translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    min-width: 44px; text-align: center;
  }
  .die-result.show { opacity: 1; transform: scale(1) translateY(0); }
  .die-result.flash { animation: numFlash 0.3s ease; }

  .plus-sign {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.4rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* 3D scene */
  .scene {
    width: 150px; height: 150px;
    perspective: 600px;
    cursor: pointer;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
    transition: filter 0.3s;
  }
  .scene:hover { filter: drop-shadow(0 20px 60px rgba(240,224,64,0.3)); }

  .cube {
    width: 150px; height: 150px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(30deg);
    border-radius: 20px;
  }

  .cube.idle  { animation: floatIdle  4s ease-in-out infinite; }
  .cube.idle-b{ animation: floatIdleB 4s ease-in-out infinite; }
  .cube.idle-locked  { animation: floatIdleLocked  4s ease-in-out infinite; }
  .cube.idle-locked-b{ animation: floatIdleLockedB 4s ease-in-out infinite; }

  @keyframes floatIdle {
    0%,100%{ transform: rotateX(-20deg) rotateY(30deg) translateY(0px); }
    50%    { transform: rotateX(-20deg) rotateY(30deg) translateY(-8px); }
  }
  @keyframes floatIdleB {
    0%,100%{ transform: rotateX(-20deg) rotateY(30deg) translateY(-8px); }
    50%    { transform: rotateX(-20deg) rotateY(30deg) translateY(0px); }
  }
  @keyframes floatIdleLocked {
    0%,100%{ transform: rotateX(var(--idle-rx,-20deg)) rotateY(var(--idle-ry,30deg)) translateY(0px); }
    50%    { transform: rotateX(var(--idle-rx,-20deg)) rotateY(var(--idle-ry,30deg)) translateY(-8px); }
  }
  @keyframes floatIdleLockedB {
    0%,100%{ transform: rotateX(var(--idle-rx,-20deg)) rotateY(var(--idle-ry,30deg)) translateY(-8px); }
    50%    { transform: rotateX(var(--idle-rx,-20deg)) rotateY(var(--idle-ry,30deg)) translateY(0px); }
  }

  .cube.rolling { animation: rolling 0.6s ease-in-out; }
  @keyframes rolling {
    0%  { transform: rotateX(-20deg) rotateY(30deg) scale(1); }
    20% { transform: rotateX(200deg) rotateY(150deg) rotateZ(60deg) scale(0.85); }
    50% { transform: rotateX(420deg) rotateY(320deg) rotateZ(130deg) scale(0.9); }
    80% { transform: rotateX(600deg) rotateY(500deg) rotateZ(200deg) scale(0.95); }
    100%{ transform: rotateX(var(--final-rx,-20deg)) rotateY(var(--final-ry,30deg)) scale(1); }
  }

  .cube.landing { animation: landing 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes landing {
    0%  { transform: rotateX(var(--final-rx,-20deg)) rotateY(var(--final-ry,30deg)) translateY(-10px) scale(1.05); }
    40% { transform: rotateX(var(--final-rx,-20deg)) rotateY(var(--final-ry,30deg)) translateY(6px)   scale(0.97); }
    70% { transform: rotateX(var(--final-rx,-20deg)) rotateY(var(--final-ry,30deg)) translateY(-3px)  scale(1.01); }
    100%{ transform: rotateX(var(--final-rx,-20deg)) rotateY(var(--final-ry,30deg)) translateY(0px)   scale(1);    }
  }

  .face {
    position: absolute;
    width: 150px; height: 150px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16162a 40%, #0d0d1a 100%);
    border: 2px solid rgba(240,224,64,0.25);
    border-radius: 20px;
    display: grid; place-items: center;
    overflow: hidden;
  }
  .face::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
    border-radius: 18px; pointer-events: none;
  }

  .face-front  { transform: translateZ(75px); }
  .face-back   { transform: rotateY(180deg)  translateZ(75px); }
  .face-right  { transform: rotateY(90deg)   translateZ(75px); }
  .face-left   { transform: rotateY(-90deg)  translateZ(75px); }
  .face-top    { transform: rotateX(90deg)   translateZ(75px); }
  .face-bottom { transform: rotateX(-90deg)  translateZ(75px); }

  .dots {
    width: 110px; height: 110px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
  }
  .dot-cell { display:flex; align-items:center; justify-content:center; }
  .dot {
    width:16px; height:16px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fff9a0, #f0e040 40%, #c8b800);
    box-shadow: 0 0 8px rgba(240,224,64,0.8), 0 0 16px rgba(240,224,64,0.4), inset 0 2px 4px rgba(255,255,255,0.4);
    opacity:0;
  }
  .dot.visible { opacity:1; }

  .shadow-ellipse {
    width:110px; height:18px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
    margin-top:-6px;
    transition: all 0.3s;
  }



  /* Sum */
  .sum-section {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .sum-label {
    font-size: 0.68rem; letter-spacing: 0.35em;
    color: var(--muted); text-transform: uppercase;
  }
  .sum-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 5rem; line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(240,224,64,0.6), 0 0 60px rgba(240,224,64,0.25);
    opacity: 0;
    transform: scale(0.5) translateY(16px);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    min-width: 70px; text-align: center;
  }
  .sum-value.show  { opacity: 1; transform: scale(1) translateY(0); }
  .sum-value.flash { animation: sumFlash 0.35s ease; }
  @keyframes sumFlash {
    0%,100%{ text-shadow: 0 0 30px rgba(240,224,64,0.6), 0 0 60px rgba(240,224,64,0.25); }
    50%    { text-shadow: 0 0 70px rgba(240,224,64,1), 0 0 130px rgba(240,224,64,0.5); }
  }

  /* Buttons */
  .btn-row { display:flex; gap:14px; align-items:center; }

  .btn-roll-all {
    font-family:'Bebas Neue', cursive;
    font-size:1.4rem; letter-spacing:0.2em;
    color:#0a0a12;
    background: linear-gradient(135deg, #f0e040, #c8b800);
    border:none; border-radius:10px;
    padding:12px 34px; cursor:pointer;
    box-shadow: 0 4px 20px rgba(240,224,64,0.35);
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  }
  .btn-roll-all:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(240,224,64,0.5); filter:brightness(1.1); }
  .btn-roll-all:active{ transform:translateY(1px); }

  .btn-reset {
    font-family:'Bebas Neue', cursive;
    font-size:1.4rem; letter-spacing:0.2em;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--muted);
    border-radius:10px;
    padding:12px 26px; cursor:pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.15s;
  }
  .btn-reset:hover { color:#e8e8f0; border-color:#e8e8f0; transform:translateY(-2px); box-shadow:0 4px 20px rgba(255,255,255,0.08); }
  .btn-reset:active{ transform:translateY(1px); }

  .hint {
    font-size:0.66rem; letter-spacing:0.22em;
    color:var(--muted); text-transform:uppercase;
    animation: hintBlink 2s ease-in-out infinite;
  }
  @keyframes hintBlink {
    0%,100%{ opacity:0.45; }
    50%    { opacity:0.9; }
  }

  /* Particles */
  .particle {
    position:fixed; border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 6px rgba(240,224,64,0.8);
    pointer-events:none; z-index:99;
  }

  @keyframes numFlash {
    0%,100%{ text-shadow:0 0 16px rgba(240,224,64,0.5); }
    50%    { text-shadow:0 0 50px rgba(240,224,64,1), 0 0 90px rgba(240,224,64,0.5); }
  }
</style>
</head>
<body>

<div class="container">

  <div class="title">Roll the Dice</div>

  <!-- ── Two Dice ── -->
  <div class="dice-row">

    <!-- Die 1 -->
    <div class="dice-wrap">
      <div class="scene" id="scene1" onclick="rollSingle(0)">
        <div class="cube idle" id="cube1">
          <div class="face face-front">
            <div class="dots">
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
            </div>
          </div>
          <div class="face face-back">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-right">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-left">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-top">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-bottom">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="shadow-ellipse" id="shadow1"></div>
      <div class="die-result" id="result1">—</div>
    </div>

    <div class="plus-sign">+</div>

    <!-- Die 2 -->
    <div class="dice-wrap">
      <div class="scene" id="scene2" onclick="rollSingle(1)">
        <div class="cube idle-b" id="cube2">
          <div class="face face-front">
            <div class="dots">
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
            </div>
          </div>
          <div class="face face-back">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-right">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-left">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-top">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
              <div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div>
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
          <div class="face face-bottom">
            <div class="dots">
              <div class="dot-cell"><div class="dot visible"></div></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div>
              <div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot visible"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="shadow-ellipse" id="shadow2"></div>
      <div class="die-result" id="result2">—</div>
    </div>

  </div>

  <!-- Sum -->
  <div class="sum-section">
    <div class="sum-label">Total</div>
    <div class="sum-value" id="sumValue">—</div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-roll-all" onclick="rollBoth()">Roll Both</button>
    <button class="btn-reset"    onclick="resetAll()">Reset</button>
  </div>

  <div class="hint">Click a die · Roll Both · or press Space</div>
<script src="script.js"></script>
</div>


</body>
</html>
